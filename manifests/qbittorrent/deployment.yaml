apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
      - name: qbittorrent
        image: linuxserver/qbittorrent:latest
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Istanbul"
        - name: WEBUI_PORT
          value: "8081"
        ports:
        - containerPort: 8081
        volumeMounts:
        - name: all-data
          mountPath: /config
          subPath: app_configs/qbittorrent
        - name: all-data
          mountPath: /downloads
          subPath: media_data/downloads
      volumes:
      - name: all-data
        persistentVolumeClaim:
          claimName: storage-pvc
