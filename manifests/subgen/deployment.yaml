apiVersion: apps/v1
kind: Deployment
metadata:
  name: subgen
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: subgen
  template:
    metadata:
      labels:
        app: subgen
    spec:
      containers:
      - name: subgen-container
        image: mccloud/subgen:cpu
        ports:
        - containerPort: 9000
        envFrom:
        - secretRef:
            name: flix-secrets
        resources:
          limits:
            cpu: "4"
            memory: "8Gi"
          requests:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: config-vol
          mountPath: /config
          subPath: subgen            # Whisper modelleri ve ayarlar SSD'de (Hızlı)
        - name: media-vol
          mountPath: /data/media/adult
          subPath: media_data/library/adult # İşlenecek videolar GDrive'da
      volumes:
      - name: config-vol
        persistentVolumeClaim:
          claimName: config-pvc      # Beyin: SSD üzerindeki modeller
      - name: media-vol
        persistentVolumeClaim:
          claimName: storage-pvc     # Kas: Buluttaki videolar
