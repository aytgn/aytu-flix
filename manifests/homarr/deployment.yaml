apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  labels:
    app: homarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      containers:
      - name: homarr
        image: ghcr.io/ajnart/homarr:latest
        ports:
        - containerPort: 7575
        volumeMounts:
        - name: config
          mountPath: /app/data/configs
          subPath: app_configs/homarr/configs
        - name: config
          mountPath: /data
          subPath: app_configs/homarr/data
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: storage-pvc
