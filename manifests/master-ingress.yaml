# ==========================================
# 1. BÖLÜM: STANDART YÖNLENDİRMELER
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aytu-flix-master-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  rules:
  - http:
      paths:
      # --- MUTFAK (Admin) ---
      - path: /radarr
        pathType: Prefix
        backend:
          service:
            name: radarr-service
            port:
              number: 7878
      - path: /prowlarr
        pathType: Prefix
        backend:
          service:
            name: prowlarr-service
            port:
              number: 9696
              
      # --- İZLEME ---
      - path: /jellyfin
        pathType: Prefix
        backend:
          service:
            name: jellyfin-service
            port:
              number: 8096
              
      # --- KARŞILAMA SAYFASI (Dashboard) ---
      - path: /hub
        pathType: Prefix
        backend:
          service:
            name: dashboard-service
            port:
              number: 80
              
      # --- VİTRİN (Aile İçin) ---
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jellyseerr-service
            port:
              number: 5055

---
# ==========================================
# 2. BÖLÜM: SADECE qBITTORRENT İÇİN REWRITE 
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbit-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # Gelen isteğin başındaki /qbit kısmını silip pod'a öyle yollar
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      # Bu regex kuralı /qbit ve sonrasını yakalar
      - path: /qbit(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: qbittorrent-service
            port:
              number: 8081
