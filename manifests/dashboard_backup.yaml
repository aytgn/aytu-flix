apiVersion: v1
kind: ConfigMap
metadata:
  name: aytu-flix-dashboard-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="tr">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Aytu-Flix Sistem Merkezi</title>
      <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { color: #38bdf8; margin-bottom: 40px; font-size: 2.5rem; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; width: 90%; max-width: 900px; }
        a { text-decoration: none; }
        .card { background: #1e293b; padding: 25px 20px; border-radius: 12px; text-align: center; color: white; font-weight: bold; font-size: 1.1rem; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #334155; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); background: #334155; }
        .card.jellyfin { border-bottom: 4px solid #aa5cc3; }
        .card.jellyseerr { border-bottom: 4px solid #ec4899; }
        .card.radarr { border-bottom: 4px solid #ffc230; }
        .card.prowlarr { border-bottom: 4px solid #ff4e00; }
        .card.qbit { border-bottom: 4px solid #2b73b7; }
      </style>
    </head>
    <body>
      <h1>🚀 Aytu-Flix</h1>
      <div class="grid">
        <a href="/jellyfin/"><div class="card jellyfin">🎬 Jellyfin (İzle)</div></a>
        <a href="/"><div class="card jellyseerr">🍿 Vitrin (İstek)</div></a>
        <a href="/radarr/"><div class="card radarr">🎥 Radarr (Film)</div></a>
        <a href="/prowlarr/"><div class="card prowlarr">🔍 Prowlarr (İndex)</div></a>
        <a href="/qbit/"><div class="card qbit">⬇️ qBittorrent</div></a>
      </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aytu-dashboard
  template:
    metadata:
      labels:
        app: aytu-dashboard
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html/hub
      volumes:
      - name: html-volume
        configMap:
          name: aytu-flix-dashboard-html
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  type: ClusterIP
  selector:
    app: aytu-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
